<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>D&D Character Creator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="page-wrapper">

    <!-- Top Header -->
    <header class="site-header">
      <h1>D&D Character Creator</h1>
      <p>Create, manage, and save your character sheet</p>
    </header>

    <!-- Navbar Tabs -->
    <nav class="tab-navbar">
      <a href="index.html" class="tab-link">Ability Scores</a>
      <a href="combat.html" class="tab-link">Combat</a>
      <a href="Skills.html" class="tab-link">Skills</a>
      <a href="inventory.html" class="tab-link">Inventory</a>
      <a href="notes.html" class="tab-link active">Notes</a>
    </nav>

    <!-- Main Content Area -->
    <main class="content-panel">

      <section class="section-header">
        <h2>Notes</h2>
        <p>
          Take notes for your character and write your backstory.
        </p>
      </section>

      <section class="card-grid">
        <div class="notes-card">
            <h3>Backstory</h3>
            <form class="note-box">
                <textarea type="text" name="Backstory" class="note-input"></textarea>
            </form>
        </div>
      
        <div class="notes-card">
            <h3>Session Notes</h3>
            <form class="note-box">
                <textarea type="text" name="Session-notes" class="note-input"></textarea>
            </form>
        </div>
      </section>

      <section class="card-grid">
        <div class="notes-card">
            <h3>DMs Notes</h3>
            <form class="note-box">
                <textarea type="text" name="dm-notes" class="note-input"></textarea>
            </form>
        </div>
      </section>

      

    </main>
  </div>
  <script src="scripts.js"></script>
</body>
</html>
