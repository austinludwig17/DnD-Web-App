<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>D&D Character Creator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="page-wrapper">

    <!-- Top Header -->
    <header class="site-header">
      <h1>D&D Character Creator</h1>
      <p>Create, manage, and save your character sheet</p>
    </header>

    <!-- Navbar Tabs -->
    <nav class="tab-navbar">
      <a href="index.html" class="tab-link">Ability Scores</a>
      <a href="combat.html" class="tab-link">Combat</a>
      <a href="Skills.html" class="tab-link active">Skills</a>
      <a href="inventory.html" class="tab-link">Inventory</a>
      <a href="notes.html" class="tab-link">Notes</a>
    </nav>

    <!-- Main Content Area -->
    <main class="content-panel">

      <section class="section-header">
        <h2>Skills</h2>
        <p>
          Set your core character skills and apply any modifiers below.
        </p>
      </section>

      <section class="skills-grid">

  <div class="skill-row">
    <label><input type="checkbox" class="skill-prof" data-skill="Acrobatics"> Acrobatics (DEX)</label>
    <input type="number" class="skill-mod" data-skill="Acrobatics" value="0">
  </div>

  <div class="skill-row">
    <label><input type="checkbox" class="skill-prof" data-skill="Animal Handling"> Animal Handling (WIS)</label>
    <input type="number" class="skill-mod" data-skill="Animal Handling" value="0">
  </div>

  <div class="skill-row">
    <label><input type="checkbox" class="skill-prof" data-skill="Arcana"> Arcana (INT)</label>
    <input type="number" class="skill-mod" data-skill="Arcana" value="0">
  </div>

  <div class="skill-row">
    <label><input type="checkbox" class="skill-prof" data-skill="Athletics"> Athletics (STR)</label>
    <input type="number" class="skill-mod" data-skill="Athletics" value="0">
  </div>

  <div class="skill-row">
    <label><input type="checkbox" class="skill-prof" data-skill="Deception"> Deception (CHA)</label>
    <input type="number" class="skill-mod" data-skill="Deception" value="0">
  </div>

  <div class="skill-row">
    <label><input type="checkbox" class="skill-prof" data-skill="History"> History (INT)</label>
    <input type="number" class="skill-mod" data-skill="History" value="0">
  </div>

  <div class="skill-row">
    <label><input type="checkbox" class="skill-prof" data-skill="Insight"> Insight (WIS)</label>
    <input type="number" class="skill-mod" data-skill="Insight" value="0">
  </div>

  <div class="skill-row">
    <label><input type="checkbox" class="skill-prof" data-skill="Intimidation"> Intimidation (CHA)</label>
    <input type="number" class="skill-mod" data-skill="Intimidation" value="0">
  </div>

  <div class="skill-row">
    <label><input type="checkbox" class="skill-prof" data-skill="Investigation"> Investigation (INT)</label>
    <input type="number" class="skill-mod" data-skill="Investigation" value="0">
  </div>

  <div class="skill-row">
    <label><input type="checkbox" class="skill-prof" data-skill="Medicine"> Medicine (WIS)</label>
    <input type="number" class="skill-mod" data-skill="Medicine" value="0">
  </div>

  <div class="skill-row">
    <label><input type="checkbox" class="skill-prof" data-skill="Nature"> Nature (INT)</label>
    <input type="number" class="skill-mod" data-skill="Nature" value="0">
  </div>

  <div class="skill-row">
    <label><input type="checkbox" class="skill-prof" data-skill="Perception"> Perception (WIS)</label>
    <input type="number" class="skill-mod" data-skill="Perception" value="0">
  </div>

  <div class="skill-row">
    <label><input type="checkbox" class="skill-prof" data-skill="Performance"> Performance (CHA)</label>
    <input type="number" class="skill-mod" data-skill="Performance" value="0">
  </div>

  <div class="skill-row">
    <label><input type="checkbox" class="skill-prof" data-skill="Persuasion"> Persuasion (CHA)</label>
    <input type="number" class="skill-mod" data-skill="Persuasion" value="0">
  </div>

  <div class="skill-row">
    <label><input type="checkbox" class="skill-prof" data-skill="Religion"> Religion (INT)</label>
    <input type="number" class="skill-mod" data-skill="Religion" value="0">
  </div>

  <div class="skill-row">
    <label><input type="checkbox" class="skill-prof" data-skill="Sleight of Hand"> Sleight of Hand (DEX)</label>
    <input type="number" class="skill-mod" data-skill="Sleight of Hand" value="0">
  </div>

  <div class="skill-row">
    <label><input type="checkbox" class="skill-prof" data-skill="Stealth"> Stealth (DEX)</label>
    <input type="number" class="skill-mod" data-skill="Stealth" value="0">
  </div>

  <div class="skill-row">
    <label><input type="checkbox" class="skill-prof" data-skill="Survival"> Survival (WIS)</label>
    <input type="number" class="skill-mod" data-skill="Survival" value="0">
  </div>

</section>

      

    </main>
  </div>
  <script src="scripts.js"></script>
</body>
</html>
